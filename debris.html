<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debris Field | 2bitArcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <!-- Debris Field: powered by the MIT-licensed Canvas Asteroids engine
         (c) 2010 Doug McInnes - https://github.com/dmcinnes/HTML5-Asteroids
         Full license: /debris/LICENSE -->
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        background: radial-gradient(ellipse at 50% 30%, #14092e 0%, #05020f 70%, #000 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: 'VT323', monospace; }
      #game-title { color: #ff9900; font-size: 42px; letter-spacing: 6px; margin: 0 0 10px 0;
        text-shadow: 0 0 14px #ff6600; }
      #canvas { border: 2px solid #ff9900; box-shadow: 0 0 30px rgba(255, 120, 0, 0.35);
        background: #000; max-width: 96vw; }
      #hint { color: #888; font-size: 20px; margin-top: 10px; }
      .button { position: absolute; border: 1px solid #ff9900; color: #ff9900;
        font-family: 'VT323', monospace; display: flex; align-items: center; justify-content: center; }
      #left-controls { position: absolute; left: 1px; bottom: 0px; display: none; }
      #right-controls { position: absolute; right: 1px; bottom: 0px; display: none; }
      #up { width: 200px; height: 100px; bottom: 100px; }
      #left { width: 100px; height: 100px; bottom: 0px; }
      #right { width: 100px; height: 100px; bottom: 0px; left: 100px; }
      #space { width: 200px; height: 200px; bottom: 0px; right: 0px; }
      #arcade-home { position: fixed; top: 8px; left: 8px; z-index: 500; font-family: 'VT323', monospace;
        font-size: 20px; color: #888; text-decoration: none; opacity: 0.6; }
      #arcade-home:hover { color: #ff9900; opacity: 1; }
    </style>
    <script src="debris/jquery-1.4.1.min.js"></script>
    <script src="debris/vector_battle_regular.typeface.js"></script>
    <script src="debris/ipad.js"></script>
    <script src="debris/game.js"></script>
    <script src="debris/debris-bridge.js"></script>
  </head>
  <body>
    <a id="arcade-home" href="./index.html" title="Back to 2bitArcade">&#8962; ARCADE</a>
    <h1 id="game-title">DEBRIS FIELD</h1>
    <div id="game-container">
      <canvas id="canvas" width="780" height="540"></canvas>
      <div id="left-controls">
        <div id="up" class="button">THRUST</div>
        <div id="left" class="button">LEFT</div>
        <div id="right" class="button">RIGHT</div>
      </div>
      <div id="right-controls">
        <div id="space" class="button">FIRE</div>
      </div>
    </div>
    <p id="hint">ARROWS to fly &bull; SPACE to fire &bull; every run counts toward the champion boards</p>
  </body>
</html>
