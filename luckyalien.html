<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="/arcade-config.js"></script>
    <script src="/access-guard.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lucky Alien | 2bitArcade</title>
    <base href="luckyalien/" />
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      /* Phaser injects its canvas into <body>; center it, fill the screen */
      body { display: flex; align-items: center; justify-content: center; }
      canvas { max-width: 100vw; max-height: 100vh; display: block; }
      #arcade-home { position: fixed; top: 8px; left: 8px; z-index: 9999; font-family: monospace;
        font-size: 16px; color: #888; text-decoration: none; opacity: 0.55; }
      #arcade-home:hover { color: #ff9900; opacity: 1; }
    </style>
  </head>
  <body>
    <a id="arcade-home" href="/index.html" title="Back to 2bitArcade">&#8962; ARCADE</a>

    <!-- world global the game expects (was defined inline in the original page) -->
    <script type="text/javascript">const world = {};</script>

    <!-- Phaser (CDN, same version the game targets) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.16.2/dist/phaser.min.js"></script>

    <!-- World data -->
    <script src="data/Grassland.js" charset="utf-8"></script>
    <script src="data/Forest.js" charset="utf-8"></script>
    <script src="data/Clouds.js" charset="utf-8"></script>
    <script src="data/Boss.js" charset="utf-8"></script>

    <!-- Scenes -->
    <script src="scenes/Scene.js" charset="utf-8"></script>
    <script src="scenes/Start.js" charset="utf-8"></script>
    <script src="scenes/Levels.js" charset="utf-8"></script>
    <script src="scenes/Credits.js" charset="utf-8"></script>
    <script src="scenes/SignContent.js" charset="utf-8"></script>
    <script src="scenes/Instructions.js" charset="utf-8"></script>

    <!-- Config + main -->
    <script src="config.js" charset="utf-8"></script>
    <script src="script.js"></script>

    <!-- Secondary -->
    <script src="main/Controls.js" charset="utf-8"></script>
    <script src="main/Animations.js" charset="utf-8"></script>
    <script src="main/Boss.js" charset="utf-8"></script>

    <!-- Main loop -->
    <script src="main/preload.js" charset="utf-8"></script>
    <script src="main/create.js" charset="utf-8"></script>
    <script src="main/update.js" charset="utf-8"></script>

    <!-- 2bitArcade leaderboard bridge -->
    <script src="la-bridge.js"></script>
  </body>
</html>
