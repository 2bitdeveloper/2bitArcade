name: b1t cabinet ghost

on:
  schedule:
    # 3 runs/day — safe for the X free tier's tiny read quota.
    # Times in UTC: 03:00, 11:00, 19:00 (~8:30am / 4:30pm / 12:30am IST)
    - cron: "0 3,11,19 * * *"
  workflow_dispatch: {}   # manual "run now" button in the Actions tab

permissions:
  contents: write         # needed to commit b1t-state.json back

concurrency:
  group: b1t-bot
  cancel-in-progress: false

jobs:
  haunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install deps
        run: npm install twitter-api-v2 @anthropic-ai/sdk dotenv tsx

      - name: run one pass
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx bot/b1t-x-bot.ts tick

      - name: persist state
        run: |
          git config user.name "b1t"
          git config user.email "b1t@users.noreply.github.com"
          git add b1t-state.json || true
          git diff --staged --quiet || git commit -m "b1t: update state ▓▒░"
          git push
